# docker-compose.test.yml
# Usage: See the `test:local` script in package.json, or run manually:
#   docker compose -f docker-compose.test.yml up -d && \
#   NODE_ENV=test LOCAL_TEST_DB_URL=... bunx drizzle-kit push --config=src/config/drizzle.config.ts --force && \
#   bun run test:integration && \
#   docker compose -f docker-compose.test.yml down --remove-orphans
# No 'volumes:' key — intentionally ephemeral. Every run starts from a clean slate.

services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432" 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s
