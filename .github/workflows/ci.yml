name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Test
  # Uses a GitHub Actions service container for Postgres.
  # NO VPS credentials are used here — the DB is ephemeral and lives only for
  # the duration of this job inside the GitHub Actions runner.
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    # Spin up a fresh, isolated Postgres instance as a service container.
    # This DB is destroyed automatically when the job finishes.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      # Points to the service container above — never touches the VPS.
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # JWT_SECRET must be ≥32 chars; using a fixed CI-only value is safe here.
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      LOG_LEVEL: error
      PORT: 3000

    steps:
      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚡️ Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install Dependencies
        run: bun install --frozen-lockfile

      - name: 🧹 Lint Check (Biome)
        run: bun run lint

      - name: 🛡️ Type Check (TSC)
        run: bun run typecheck

      - name: 🗄️ Run Migrations (Service Container DB)
        run: bunx drizzle-kit push --config=src/config/drizzle.config.ts --force

      - name: 🧪 Run Unit Tests
        run: bun run test:unit

      - name: 🧪 Run Integration Tests
        run: bun run test:integration:local

      - name: 🏗️ Verify Build
        run: bun run build

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy to VPS (Staging/UAT)
  # Runs ONLY if the test job passes. SSH into the VPS and pull latest code.
  # The app on the VPS uses its own .env file — completely separate from CI.
  # ─────────────────────────────────────────────────────────────────────────────
